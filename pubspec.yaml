name: mehfil_frontend
description: "Mehfil — Audio rooms + YouTube sync + open mic"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.6.1

  # Network
  dio: ^5.7.0
  socket_io_client: ^2.0.3+1

  # Auth
  google_sign_in: ^6.2.1
  flutter_secure_storage: ^9.2.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  shimmer: ^3.0.0

  # YouTube
  youtube_player_flutter: ^9.1.1

  # LiveKit voice
  livekit_client: ^2.4.2
  permission_handler: ^11.3.1
  flutter_foreground_task: ^8.17.0
  wakelock_plus: ^1.2.8
  audio_session: ^0.1.25

  # WebView (YouTube picker)
  webview_flutter: ^4.9.0

  # DI
  get_it: ^8.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
